name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ~/personal-website
    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Build and restart
        run: docker compose up -d --build

      - name: Clean up old images
        run: docker image prune -f
